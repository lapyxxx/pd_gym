<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Codex Remote</title>
  <link rel="stylesheet" href="/styles.css?v=20260428-1" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button id="chat-back" class="back-button" type="button" aria-label="Open chats">
          <svg class="back-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 20L7 12L15 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <div class="topbar-copy">
          <h1 id="project-title">Чаты</h1>
        </div>
        <div class="topbar-actions">
          <div id="workspace-warning" class="workspace-warning hidden" aria-label="Workspace is not synced" title="Workspace is not synced">!</div>
          <div id="workspace-error-popup" class="sync-error-popup hidden" role="status" aria-live="polite"></div>
          <button id="menu-button" class="icon-button topbar-menu hidden" type="button" aria-label="Open settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="5" r="1.7"></circle>
              <circle cx="12" cy="12" r="1.7"></circle>
              <circle cx="12" cy="19" r="1.7"></circle>
            </svg>
          </button>
        </div>
      </header>

      <div id="workspace-sync-strip" class="workspace-sync-strip hidden" aria-hidden="true">
        <div class="workspace-sync-strip-track">
          <div id="workspace-sync-strip-fill" class="workspace-sync-strip-fill"></div>
          <div id="workspace-sync-strip-done" class="workspace-sync-strip-done hidden">✓</div>
        </div>
      </div>

      <aside id="project-drawer" class="project-drawer hidden">
        <div class="drawer-card">
          <div class="drawer-header">
            <div class="drawer-header-main">
              <div id="drawer-title" class="drawer-title">Мои чаты</div>
            </div>
            <div class="drawer-header-actions">
              <button id="profile-button" class="sync-icon-button drawer-profile-button" type="button" aria-label="Choose account">
                <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path d="M10 10C7.7835 10 5.98095 8.206 5.98095 6C5.98095 3.794 7.7835 2 10 2C12.2165 2 14.019 3.794 14.019 6C14.019 8.206 12.2165 10 10 10ZM13.7759 10.673C15.3704 9.396 16.2999 7.331 15.9582 5.07C15.5614 2.447 13.369 0.348 10.7224 0.042C7.07012 -0.381 3.97143 2.449 3.97143 6C3.97143 7.89 4.8516 9.574 6.22411 10.673C2.85213 11.934 0.390463 14.895 0.004634 18.891C-0.051632 19.482 0.411563 20 1.00839 20C1.51981 20 1.95588 19.616 2.0011 19.109C2.404 14.646 5.83727 12 10 12C14.1627 12 17.596 14.646 17.9989 19.109C18.0441 19.616 18.4802 20 18.9916 20C19.5884 20 20.0516 19.482 19.9954 18.891C19.6095 14.895 17.1479 11.934 13.7759 10.673Z" fill="currentColor"></path>
                </svg>
              </button>
              <button id="drawer-nav-button" class="sync-icon-button drawer-nav-button" type="button" aria-label="Open archive">
                <svg id="drawer-archive-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9 12C9 11.5341 9 11.3011 9.07612 11.1173C9.17761 10.8723 9.37229 10.6776 9.61732 10.5761C9.80109 10.5 10.0341 10.5 10.5 10.5H13.5C13.9659 10.5 14.1989 10.5 14.3827 10.5761C14.6277 10.6776 14.8224 10.8723 14.9239 11.1173C15 11.3011 15 11.5341 15 12C15 12.4659 15 12.6989 14.9239 12.8827C14.8224 13.1277 14.6277 13.3224 14.3827 13.4239C14.1989 13.5 13.9659 13.5 13.5 13.5H10.5C10.0341 13.5 9.80109 13.5 9.61732 13.4239C9.37229 13.3224 9.17761 13.1277 9.07612 12.8827C9 12.6989 9 12.4659 9 12Z" stroke="currentColor" stroke-width="1.5"></path>
                  <path d="M20.5 7V13C20.5 16.7712 20.5 18.6569 19.3284 19.8284C18.1569 21 16.2712 21 12.5 21H11.5M3.5 7V13C3.5 16.7712 3.5 18.6569 4.67157 19.8284C5.37634 20.5332 6.3395 20.814 7.81608 20.9259" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                  <path d="M12 3H4C3.05719 3 2.58579 3 2.29289 3.29289C2 3.58579 2 4.05719 2 5C2 5.94281 2 6.41421 2.29289 6.70711C2.58579 7 3.05719 7 4 7H20C20.9428 7 21.4142 7 21.7071 6.70711C22 6.41421 22 5.94281 22 5C22 4.05719 22 3.58579 21.7071 3.29289C21.4142 3 20.9428 3 20 3H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
                </svg>
                <svg id="drawer-back-icon" class="hidden back-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M15 20L7 12L15 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <div id="sync-now-control" class="sync-control">
                <button id="sync-now-button" class="sync-icon-button" type="button" aria-label="Sync chats"></button>
                <div id="sync-error-popup" class="sync-error-popup hidden" role="status" aria-live="polite"></div>
              </div>
            </div>
          </div>
          <div id="projects-list" class="project-list"></div>
        </div>
      </aside>

      <main id="messages" class="messages"></main>

      <form id="composer" class="composer">
        <div id="attachments-preview" class="attachments-preview"></div>
        <div class="composer-row">
          <input id="file-input" class="hidden" type="file" multiple />
          <button id="attach-button" class="icon-button composer-icon" type="button" aria-label="Attach files">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16.5 6.5 9.2 13.8a3.3 3.3 0 1 0 4.7 4.7l7.1-7.1a5.3 5.3 0 0 0-7.5-7.5L5.8 11.6a7.3 7.3 0 1 0 10.3 10.3l5.2-5.2"></path>
            </svg>
          </button>
          <textarea id="message-input" class="message-input" rows="1" placeholder="Сообщение"></textarea>
          <button id="send-button" class="send-button" type="submit" aria-label="Send message">
            <span class="send-spinner spinner hidden" aria-hidden="true"></span>
            <span id="send-stop-icon" class="send-stop-icon hidden" aria-hidden="true"></span>
            <svg class="send-icon" viewBox="0 -0.5 25 25" fill="none" aria-hidden="true">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M18.455 9.8834L7.063 4.1434C6.76535 3.96928 6.40109 3.95274 6.08888 4.09916C5.77667 4.24558 5.55647 4.53621 5.5 4.8764C5.5039 4.98942 5.53114 5.10041 5.58 5.2024L7.749 10.4424C7.85786 10.7903 7.91711 11.1519 7.925 11.5164C7.91714 11.8809 7.85789 12.2425 7.749 12.5904L5.58 17.8304C5.53114 17.9324 5.5039 18.0434 5.5 18.1564C5.55687 18.4961 5.77703 18.7862 6.0889 18.9323C6.40078 19.0785 6.76456 19.062 7.062 18.8884L18.455 13.1484C19.0903 12.8533 19.4967 12.2164 19.4967 11.5159C19.4967 10.8154 19.0903 10.1785 18.455 9.8834V9.8834Z" fill="currentColor"></path>
            </svg>
          </button>
        </div>
      </form>
    </div>

    <div id="settings-sheet" class="sheet-backdrop hidden">
      <div id="settings-panel" class="bottom-sheet" role="dialog" aria-modal="true" aria-label="Run settings">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">Параметры запуска</div>
        </div>
        <div id="sheet-thread-actions" class="sheet-thread-actions hidden">
          <button id="select-workspace-button" class="sheet-action-button secondary" type="button">Workspace: Any</button>
          <button id="sync-thread-button" class="sheet-action-button secondary" type="button">Sync</button>
          <button id="sync-workspace-button" class="sheet-action-button secondary" type="button">Sync workspace</button>
          <button id="return-to-laptop-button" class="sheet-action-button" type="button">Передать на ПК</button>
        </div>
        <div class="controls-panel">
          <label>
            <span>Model</span>
            <select id="model-select"></select>
          </label>
          <label>
            <span>Power</span>
            <select id="power-select"></select>
          </label>
          <label>
            <span>Preset</span>
            <select id="mode-select">
              <option value="chat">chat</option>
              <option value="analyze">analyze</option>
              <option value="change">change</option>
              <option value="review">review</option>
              <option value="deploy">deploy</option>
            </select>
          </label>
        </div>
      </div>
    </div>

    <div id="preview-modal" class="preview-modal hidden">
      <div class="preview-shell">
        <button id="preview-close" class="icon-button compact preview-close" type="button" aria-label="Back">
          <svg class="back-arrow" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 20L7 12L15 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
        <img id="preview-image" class="preview-image hidden" alt="Attachment preview" />
        <div id="preview-file" class="preview-file hidden"></div>
      </div>
    </div>

    <div id="workspace-sheet" class="sheet-backdrop hidden">
      <div class="bottom-sheet workspace-sheet-panel" role="dialog" aria-modal="true" aria-label="Workspace selector">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">Workspace</div>
        </div>
        <div id="workspace-create-toggle" class="workspace-create-toggle" role="button" tabindex="0">
          <span id="workspace-create-prefix" class="workspace-create-prefix">+</span>
          <span id="workspace-create-label" class="workspace-create-label">Новый workspace</span>
          <span id="workspace-create-input-wrap" class="workspace-create-input-wrap hidden">
            <button id="workspace-create-cancel" class="workspace-create-cancel" type="button" aria-label="Cancel">×</button>
            <input id="workspace-create-input" class="workspace-create-input" type="text" placeholder="Название workspace" />
          </span>
        </div>
        <div id="workspace-options" class="workspace-options"></div>
        <div class="workspace-sheet-actions">
          <button id="workspace-any-button" class="sheet-action-button secondary" type="button">Любой</button>
          <button id="workspace-apply-button" class="sheet-action-button" type="button">Применить</button>
        </div>
      </div>
    </div>

    <div id="profile-sheet" class="sheet-backdrop hidden">
      <div class="bottom-sheet profile-sheet-panel" role="dialog" aria-modal="true" aria-label="Profile selector">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div class="sheet-title">Аккаунт</div>
        </div>
        <div id="profile-options" class="profile-options"></div>
        <div id="profile-add-row" class="profile-add-row" role="button" tabindex="0">
          <span class="profile-add-plus">+</span>
          <span class="profile-add-label">Добавить аккаунт</span>
        </div>
      </div>
    </div>

    <template id="message-template">
      <article class="message">
        <div class="bubble">
          <div class="meta"></div>
          <div class="content"></div>
        </div>
      </article>
    </template>

  <script type="module" src="/app.js?v=20260428-1"></script>
  </body>
</html>
